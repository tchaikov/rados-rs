name: Publish Crates

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish crates.io release
    runs-on: ubuntu-latest
    environment: crates-io
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo git index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Validate release context
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)"

          if [ -n "${RELEASE_TAG:-}" ]; then
            EXPECTED_TAG="v${VERSION}"
            if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
              echo "Release tag '$RELEASE_TAG' does not match workspace version '$VERSION' (expected '$EXPECTED_TAG')."
              exit 1
            fi
          fi

          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "CARGO_REGISTRY_TOKEN is not configured."
            exit 1
          fi

      - name: Verify workspace
        run: |
          cargo fmt --all --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace --all-targets

      - name: Publish crates in dependency order
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(awk -F'"' '/^version = / { print $2; exit }' Cargo.toml)"
          CRATES=(
            denc-macros
            cephconfig
            denc
            auth
            crush
            msgr2
            monclient
            osdclient
            dencoder
            rados
          )

          crate_is_published() {
            local crate="$1"
            curl --fail --silent --show-error \
              "https://crates.io/api/v1/crates/${crate}/${VERSION}" \
              >/dev/null 2>&1
          }

          for crate in "${CRATES[@]}"; do
            if crate_is_published "$crate"; then
              echo "Skipping ${crate}; ${VERSION} is already published."
              continue
            fi

            echo "Publishing ${crate} ${VERSION}..."
            cargo publish -p "${crate}" --registry crates-io
          done
