name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        # `uninlined_format_args` lives in the `clippy::pedantic` category and
        # is allow-by-default, so `-D warnings` alone does NOT catch it.
        # Lifting it explicitly to `deny` pins the "format!(\"...{x}\")" style
        # across the workspace and prevents regressions after the one-shot
        # sweep in commit 91b59c3.
        run: >-
          cargo clippy --workspace --all-targets --
          -D warnings
          -D clippy::uninlined_format_args

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace --all-targets

  corpus-test:
    name: Corpus Comparison Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        corpus_version: ['18.2.0', '19.2.0-404-g78ddc7f9027']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install ceph-common
        run: |
          sudo apt-get update
          sudo apt-get install -y ceph-common

      - name: Clone ceph-object-corpus
        run: |
          git clone --depth=1 https://github.com/ceph/ceph-object-corpus.git /tmp/ceph-object-corpus

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build dencoder
        run: cargo build -p rados --bin dencoder

      - name: Run corpus comparison test
        env:
          CORPUS_ROOT: /tmp/ceph-object-corpus
          CORPUS_VERSION: ${{ matrix.corpus_version }}
        run: cargo test -p rados --test dencoder_corpus_comparison_test -- --ignored --nocapture
