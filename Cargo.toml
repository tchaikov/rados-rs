[workspace]
members = ["crates/denc", "crates/denc-derive", "crates/auth", "crates/msgr2", "crates/crush", "crates/monclient", "crates/osdclient"]
resolver = "2"

[workspace.dependencies]
bytes = { version = "1.5", features = ["serde"] }
thiserror = "1.0"
anyhow = "1.0"
hmac = "0.12"
sha2 = "0.10"
base64 = "0.21"
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
paste = "1.0"
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
tracing-subscriber = "0.3"
crc32c = "0.6"
