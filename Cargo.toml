[workspace]
members = ["crates/denc", "crates/denc-derive", "crates/auth"]
resolver = "2"

[workspace.dependencies]
bytes = { version = "1.5", features = ["serde"] }
thiserror = "1.0"
anyhow = "1.0"
hmac = "0.12"
sha2 = "0.10"
base64 = "0.21"
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
paste = "1.0"
