[package]
name = "rados-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
bytes = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
uuid = { version = "1.0", features = ["v4"] }
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
log = "0.4"
async-trait = "0.1"
futures = "0.3"
sha2 = "0.10"
rand = "0.8"
crc32fast = "1.3"
crc32c = "0.6"
hmac = "0.12"
aes = "0.8"
cbc = { version = "0.1", features = ["alloc"] }
base64 = "0.22"
nom = "7.1"
configparser = "1.0"

[lib]
name = "rados_rs"
path = "src/lib.rs"

[[bin]]
name = "rados-client"
path = "src/bin/client.rs"

[[bin]]
name = "test_runner"
path = "src/bin/test_runner.rs"
